<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初心者向け電卓アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app" aria-labelledby="app-title">
    <section class="calculator" aria-label="電卓">
      <h1 id="app-title">シンプル電卓</h1>
      <output id="display" class="display" aria-live="polite">0</output>

      <div class="buttons">
        <button type="button" class="clear" data-action="clear">C</button>
        <button type="button" data-action="delete">⌫</button>
        <button type="button" data-operator="÷">÷</button>
        <button type="button" data-operator="×">×</button>

        <button type="button" data-number="7">7</button>
        <button type="button" data-number="8">8</button>
        <button type="button" data-number="9">9</button>
        <button type="button" data-operator="－">－</button>

        <button type="button" data-number="4">4</button>
        <button type="button" data-number="5">5</button>
        <button type="button" data-number="6">6</button>
        <button type="button" data-operator="＋">＋</button>

        <button type="button" data-number="1">1</button>
        <button type="button" data-number="2">2</button>
        <button type="button" data-number="3">3</button>
        <button type="button" class="equals" data-action="calculate">=</button>

        <button type="button" class="zero" data-number="0">0</button>
        <button type="button" data-number=".">.</button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
